<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>STMS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #drop-zone { border: 3px dashed #cbd5e1; transition: 0.3s; }
        #drop-zone.dragover { border-color: #3b82f6; background-color: #eff6ff; }
        .scroll-table { max-height: 500px; overflow-y: auto; }
        .edit-active td { background-color: #fffbeb; cursor: text; border: 1px solid #fde68a !important; }
        .hidden { display: none; }
        /* 커스텀 모달 스타일 */
        #custom-modal-overlay { background-color: rgba(0, 0, 0, 0.5); z-index: 1000; }
    </style>
</head>
<body class="bg-slate-50 p-8 text-slate-800">
    <div id="custom-modal-overlay" class="fixed inset-0 flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full text-center">
            <h3 class="text-lg font-bold mb-4">알림</h3>
            <p class="text-slate-600 mb-8">정말 수정하시겠습니까?</p>
            <div class="flex justify-center gap-4">
                <button onclick="confirmEdit(true)" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700">확인</button>
                <button onclick="confirmEdit(false)" class="bg-slate-200 text-slate-600 px-6 py-2 rounded-lg font-semibold hover:bg-slate-300">취소</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">📦 STMS 재고 관리 시스템</h1>
        
        <div id="drop-zone" class="bg-white rounded-xl p-8 text-center mb-8 border-2 shadow-sm">
            <p class="text-slate-500">납품명세서 엑셀 파일을 드롭하여 재고를 차감하세요.</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold">📊 현재 재고 현황</h2>
                <div class="flex gap-2">
                    <button id="btn-edit" onclick="showModal()" class="bg-blue-50 text-blue-600 hover:bg-blue-100 px-4 py-1.5 rounded-lg text-sm font-semibold">수정모드</button>
                    <button id="btn-save" onclick="saveInventory()" class="bg-green-600 text-white hover:bg-green-700 px-4 py-1.5 rounded-lg text-sm font-semibold hidden">저장</button>
                    <button id="btn-cancel" onclick="cancelEdit()" class="bg-slate-200 text-slate-600 hover:bg-slate-300 px-4 py-1.5 rounded-lg text-sm font-semibold hidden">되돌리기</button>
                    <button id="btn-refresh" onclick="loadInventory()" class="bg-blue-50 text-blue-600 hover:bg-blue-100 px-4 py-1.5 rounded-lg text-sm font-semibold">새로고침</button>
                </div>
            </div>
            <div class="scroll-table border rounded-lg overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200" id="stock-table">
                    <thead class="bg-slate-50 sticky top-0">
                        <tr id="table-header"></tr>
                    </thead>
                    <tbody id="inventory-list" class="divide-y divide-slate-100 bg-white"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let originalData = [];
        const displayOrder = ['순번', '신품번', '구품번', '품명', '재고수량', '공정 진행중', '입고수량'];

        async function loadInventory() {
            const res = await fetch('/inventory');
            originalData = await res.json();
            renderTable(originalData);
            exitEditModeUI();
        }

        function renderTable(data) {
            const list = document.getElementById('inventory-list');
            const header = document.getElementById('table-header');
            if (!data || data.length === 0) {
                list.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-slate-400">데이터가 없습니다.</td></tr>';
                return;
            }
            const columns = displayOrder.filter(col => Object.keys(data[0]).includes(col));
            header.innerHTML = columns.map(col => `<th class="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase">${col}</th>`).join('');
            list.innerHTML = data.map((row, idx) => `
                <tr data-index="${idx}" class="hover:bg-slate-50 transition-colors">
                    ${columns.map(col => `<td data-key="${col}" class="px-4 py-3 text-sm text-slate-600">${row[col]}</td>`).join('')}
                </tr>
            `).join('');
        }

        // 모달 표시 함수
        function showModal() {
            document.getElementById('custom-modal-overlay').classList.remove('hidden');
        }

        // 모달 확인/취소 처리
        function confirmEdit(isConfirmed) {
            document.getElementById('custom-modal-overlay').classList.add('hidden');
            if (isConfirmed) {
                document.getElementById('inventory-list').classList.add('edit-active');
                document.querySelectorAll('#inventory-list td').forEach(td => td.contentEditable = true);
                document.getElementById('btn-edit').classList.add('hidden');
                document.getElementById('btn-refresh').classList.add('hidden');
                document.getElementById('btn-save').classList.remove('hidden');
                document.getElementById('btn-cancel').classList.remove('hidden');
            }
        }

        function cancelEdit() {
            renderTable(originalData);
            exitEditModeUI();
        }

        function exitEditModeUI() {
            document.getElementById('inventory-list').classList.remove('edit-active');
            document.getElementById('btn-edit').classList.remove('hidden');
            document.getElementById('btn-refresh').classList.remove('hidden');
            document.getElementById('btn-save').classList.add('hidden');
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        async function saveInventory() {
            const rows = document.querySelectorAll('#inventory-list tr');
            const updatedData = Array.from(rows).map(row => {
                const rowObj = {};
                row.querySelectorAll('td').forEach(td => {
                    rowObj[td.dataset.key] = td.innerText.trim();
                });
                return rowObj;
            });

            try {
                const res = await fetch('/update_inventory', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });
                const result = await res.json();
                alert(result.message || result.error);
                if (result.status === 'success') loadInventory();
            } catch (e) {
                alert("저장 중 네트워크 오류가 발생했습니다.");
            }
        }

        window.onload = loadInventory;

        const dropZone = document.getElementById('drop-zone');
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-blue-50'); };
        dropZone.ondrop = async (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            alert(data.message || data.error);
            loadInventory();
        };
    </script>
</body>
</html>
